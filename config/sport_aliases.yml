# Maps Intervals.icu / source-side `sport` (or `type`) values to canonical
# internal sport labels: run | bike | strength | walk | hike | swim | recovery
# | rockclimbing | other.
#
# Matching is case-insensitive against this table. Unknown values fall back to
# "other" and are logged. Edit this file (no code change) when a new device
# emits a label we haven't seen — e.g. Apple Watch uses `Running`/`Cycling`,
# Wahoo uses `Cycling`, COROS uses `Run`.

run:
  - Run
  - Running
  - OutdoorRun
  - Outdoor Run
  - IndoorRun
  - Indoor Run
  - VirtualRun
  - TrailRun
  - TreadmillRun

bike:
  - Ride
  - Cycling
  - OutdoorCycle
  - Outdoor Cycle
  - IndoorCycle
  - Indoor Cycle
  - VirtualRide
  - EBikeRide
  - GravelRide
  - MountainBikeRide
  - IndoorRide
  - Handcycle

walk:
  - Walk
  - Walking
  - OutdoorWalk
  - Outdoor Walk
  - IndoorWalk
  - Indoor Walk
  - Treadmill_Walk

hike:
  - Hike
  - Hiking

swim:
  - Swim
  - Swimming
  - OpenWaterSwim
  - OpenWaterSwimming
  - Open Water Swimming
  - PoolSwim
  - PoolSwimming
  - Pool Swimming

strength:
  - WeightTraining
  - Strength
  - StrengthTraining
  - TraditionalStrengthTraining
  - Traditional Strength Training
  - FunctionalStrengthTraining
  - Functional Strength Training
  - CoreTraining
  - Core Training
  - Workout
  - HIIT
  - HighIntensityIntervalTraining
  - High Intensity Interval Training
  - Crossfit

recovery:
  - Yoga
  - Stretching
  - Pilates
  - BreathWork
  - Meditation
  - Mobility

rockclimbing:
  - RockClimbing
  - Climbing
  - Bouldering
  - IndoorClimbing
